<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/mheedoonung.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- PWA: ติดตั้งลงมือถือได้ (Android ใช้ manifest+SW, iOS ใช้ apple-* meta) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="หมีดูหนัง" />
    <title>หมีดูหนัง</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // กู้คืนอัตโนมัติเมื่อโหลดไฟล์ js ไม่ได้ (Cloudflare Pages ตอบ HTML แทน js ตอน deploy
      // แล้ว browser cache ทับ URL นั้นไว้ 4 ชม. → MIME error ทุกครั้งจนกว่า cache หมดอายุ)
      // fetch cache:'reload' = บังคับดึงจาก network ทับ cache entry ที่เสีย แล้วค่อย reload หน้า
      (function () {
        var KEY = 'module-retry';
        var failed = false;
        // sessionStorage throw ได้ (Safari private mode เก่า / in-app browser) — ห้ามพังทั้ง IIFE
        // อ่านไม่ได้ = ถือว่า retry ไปแล้ว (ยอมไม่ retry ดีกว่าเสี่ยง reload loop)
        function flagGet() {
          try { return sessionStorage.getItem(KEY); } catch (e) { return '1'; }
        }
        function flagSet() {
          try { sessionStorage.setItem(KEY, '1'); } catch (e) {}
        }
        window.addEventListener(
          'error',
          function (ev) {
            var el = ev.target;
            // ครอบทั้ง <script src> และ <link rel=stylesheet> — โดนวางยาได้ทั้งคู่
            var url =
              el && el.tagName === 'SCRIPT' && el.src ? el.src
              : el && el.tagName === 'LINK' && el.rel === 'stylesheet' ? el.href
              : '';
            if (!url) return;
            failed = true;
            if (flagGet()) return; // retry ครั้งเดียว กัน reload loop
            flagSet();
            // mode:'cors' ให้ตรงกับ request ของ <script crossorigin> ที่ Vite ปล่อย
            // (cache entry ต้อง match ตัวที่โดนวางยา ไม่งั้นล้างไม่ออก)
            fetch(url, { cache: 'reload', mode: 'cors' })
              .catch(function () {})
              .finally(function () {
                location.reload();
              });
          },
          true
        );
        // lazy chunk (vidstack ฯลฯ) โหลดพัง → reload ครั้งเดียว (HTML ใหม่จะชี้ chunk ใหม่เอง)
        window.addEventListener('vite:preloadError', function () {
          failed = true;
          if (flagGet()) return;
          flagSet();
          location.reload();
        });
        // โหลดสำเร็จ (ไม่มี error) = เคลียร์ flag ให้แท็บเดิม retry ได้อีกในอนาคต
        // ห้ามเคลียร์ตอน failed — 'load' fire แม้ script พัง จะกลายเป็น reload loop
        window.addEventListener('load', function () {
          if (!failed) {
            try { sessionStorage.removeItem(KEY); } catch (e) {}
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
