<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/mheedoonung.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- PWA: ติดตั้งลงมือถือได้ (Android ใช้ manifest+SW, iOS ใช้ apple-* meta) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="หมีดูหนัง" />
    <title>หมีดูหนัง</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // กู้คืนอัตโนมัติเมื่อโหลดไฟล์ js ไม่ได้ (Cloudflare Pages ตอบ HTML แทน js ตอน deploy
      // แล้ว browser cache ทับ URL นั้นไว้ 4 ชม. → MIME error ทุกครั้งจนกว่า cache หมดอายุ)
      // fetch cache:'reload' = บังคับดึงจาก network ทับ cache entry ที่เสีย แล้วค่อย reload หน้า
      (function () {
        // โควตา retry ต่อแท็บ (sessionStorage) — "ห้ามเคลียร์เด็ดขาด"
        // เวอร์ชันก่อนเคลียร์ flag ตอน load สำเร็จ → chunk ที่พังหลัง load (vite:preloadError)
        // ทำให้วน reload ไม่รู้จบ: โหลดสำเร็จ→เคลียร์→chunk พัง→reload→ซ้ำ
        var KEY = 'module-retry-count';
        var MAX_RETRY = 2;
        // sessionStorage throw ได้ (private mode เก่า) — อ่านไม่ได้ = ถือว่าเต็มโควตา ไม่เสี่ยง loop
        function count() {
          try { return Number(sessionStorage.getItem(KEY)) || 0; } catch (e) { return MAX_RETRY; }
        }
        function bump() {
          try { sessionStorage.setItem(KEY, String(count() + 1)); } catch (e) {}
        }
        // ล้าง cache ของ URL ที่พัง (ถ้ารู้) แล้ว reload — ไม่เกินโควตา
        function recover(url) {
          if (count() >= MAX_RETRY) return; // เกินโควตา = ปล่อยให้แอป error เอง ห้ามวน
          bump();
          if (url) {
            // mode:'cors' ให้ตรงกับ request ของ <script crossorigin> ที่ Vite ปล่อย
            fetch(url, { cache: 'reload', mode: 'cors' })
              .catch(function () {})
              .finally(function () {
                location.reload();
              });
          } else {
            location.reload();
          }
        }
        window.addEventListener(
          'error',
          function (ev) {
            var el = ev.target;
            // ครอบทั้ง <script src> และ <link rel=stylesheet> — โดนวางยาได้ทั้งคู่
            var url =
              el && el.tagName === 'SCRIPT' && el.src ? el.src
              : el && el.tagName === 'LINK' && el.rel === 'stylesheet' ? el.href
              : '';
            if (url) recover(url);
          },
          true
        );
        // lazy chunk (vidstack ฯลฯ) โหลดพัง — ดึง URL จากข้อความ error มาล้าง cache ด้วยถ้าเจอ
        window.addEventListener('vite:preloadError', function (ev) {
          var msg = '';
          try { msg = String((ev && ev.payload && ev.payload.message) || ''); } catch (e) {}
          var m = msg.match(/https?:\/\/[^\s'"()]+/);
          recover(m ? m[0] : '');
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
